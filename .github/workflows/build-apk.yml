name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '34'
        build-tools: '34.0.0'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Clean Prebuild
      run: npx expo prebuild --platform android --clean
    
    - name: Patch Android Project
      run: |
        # 1. إصلاح تعارض النطاقات (Namespaces)
        find node_modules/react-native-reanimated/android -name "*.gradle" -exec sed -i 's/namespace "com.swmansion.reanimated"/ /g' {} +
        
        # 2. حقن سياسة دمج الموارد مباشرة في إعدادات أندرويد لتعطيل الانهيار عند التكرار
        echo "android.packageNamingPolicy=stable" >> android/gradle.properties
        echo "android.useAndroidX=true" >> android/gradle.properties

    - name: Set Execute Permission
      run: chmod +x android/gradlew
    
    - name: Build APK (Ultimate Strategy)
      run: |
        cd android
        # استخدام أوامر Gradle 9 لتجاوز تحذيرات وأخطاء الموارد المكررة
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Pandroid.packageNamingPolicy=stable \
          --stacktrace
        cd ..

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: L-WESMOU-OS-Success
        path: android/app/build/outputs/apk/release/*.apk
