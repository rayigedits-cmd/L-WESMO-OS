name: Build APK (Force Gradle 8)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Java 17 مثالية لـ Gradle 8
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Expo Prebuild
      run: npx expo prebuild --platform android --clean
    
    - name: Force Gradle 8.10.2 Downgrade
      run: |
        # الانتقال لمجلد أندرويد وتغيير نسخة الـ Wrapper قسرياً
        cd android
        chmod +x gradlew
        ./gradlew wrapper --gradle-version 8.10.2 --distribution-type all
        # التأكد من تحديث ملف الإعدادات
        sed -i 's/gradle-9.0-all.zip/gradle-8.10.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties || true
        cd ..

    - name: Apply Packaging Fixes
      run: |
        # حقن قوانين دمج الملفات المكررة في build.gradle لتجنب Collision
        sed -i "/android {/a \    packagingOptions {\n        pickFirst '**/com_facebook_*'\n        merge '**/com_facebook_*'\n        pickFirst '**/libc++_shared.so'\n    }" android/app/build.gradle
        
        # إصلاح النطاقات للمكتبات
        find node_modules/react-native-reanimated/android -name "*.gradle" -exec sed -i 's/namespace "com.swmansion.reanimated"/ /g' {} +

    - name: Set Execute Permission
      run: chmod +x android/gradlew
    
    - name: Build APK with Gradle 8
      run: |
        cd android
        ./gradlew clean
        # البناء باستخدام الإصدار 8 الذي تم فرضه
        ./gradlew assembleRelease --no-daemon --stacktrace
        cd ..

    - name: Sign APK
      id: sign
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      continue-on-error: true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: L-WESMOU-OS-v8-Final
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
        
