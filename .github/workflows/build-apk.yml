name: Build APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '34'
        build-tools: '34.0.0'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Expo Prebuild (Clean Slate)
      run: npx expo prebuild --platform android --clean
    
    - name: Official Gradle 9 Patch
      run: |
        # إصلاح تعارض النطاقات في المكتبات الحديثة
        find node_modules/react-native-reanimated/android -name "*.gradle" -exec sed -i 's/namespace "com.swmansion.reanimated"/ /g' {} +
        
        # حقن السياسة الرسمية للتعامل مع الموارد في ملف الخصائص
        echo "android.packageNamingPolicy=stable" >> android/gradle.properties
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties

    - name: Set Execute Permission
      run: chmod +x android/gradlew
    
    - name: Build APK (Official Strategy)
      run: |
        cd android
        ./gradlew clean
        # تنفيذ أوامر Gradle 9 الرسمية لتجاوز أخطاء تصادم الموارد
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Pandroid.packageNamingPolicy=stable \
          --stacktrace
        cd ..

    - name: Sign APK
      id: sign
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      continue-on-error: true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: L-WESMOU-OS-Success
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
        
