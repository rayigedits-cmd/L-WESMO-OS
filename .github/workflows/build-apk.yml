name: Build APK (Stable Gradle 8)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Expo Prebuild
      run: npx expo prebuild --platform android --clean
    
    - name: Force Gradle Downgrade to 8.10.2
      run: |
        # تغيير نسخة Gradle في ملف الـ wrapper لضمان عدم استخدام الإصدار 9
        cd android
        ./gradlew wrapper --gradle-version 8.10.2 --distribution-type all
        cd ..
        
    - name: Patch for Stability
      run: |
        # إضافة إعدادات التوافق في ملف الخصائص
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        # استراتيجية التعامل مع الموارد المكررة (كأمان إضافي)
        sed -i "/android {/a \    packagingOptions {\n        pickFirst '**/com_facebook_*'\n        merge '**/com_facebook_*'\n    }" android/app/build.gradle

    - name: Set Execute Permission
      run: chmod +x android/gradlew
    
    - name: Build APK with Gradle 8
      run: |
        cd android
        ./gradlew clean
        # البناء باستخدام Gradle 8 الذي يتغاضى عن مشاكل التصادم البسيطة
        ./gradlew assembleRelease --no-daemon --stacktrace
        cd ..

    - name: Sign APK
      id: sign
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      continue-on-error: true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: L-WESMOU-OS-v8-Success
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
        
