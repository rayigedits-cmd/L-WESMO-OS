name: Build APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-levels: '34'
        build-tools: '34.0.0'
        ndk-version: '26.0.10792818'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Clean and Prebuild Expo
      run: npx expo prebuild --clean --platform android
    
    - name: Fix Reanimated and Resource Collisions
      run: |
        # 1. حل مشكلة تعارض الـ Namespace في Reanimated برمجياً
        find node_modules/react-native-reanimated/android -name "*.gradle" -exec sed -i 's/namespace "com.swmansion.reanimated"/ /g' {} +
        
        # 2. حل مشكلة تصادم الملفات المكررة (Facebook Resources)
        # نقوم بحذفها من مجلد الموارد قبل أن يبدأ Gradle في دمجها
        find android/app/src/main/res -name "com_facebook*" -delete

    - name: Set Execute Permission for Gradlew
      run: chmod +x android/gradlew
    
    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew clean
        # استخدام خيارات الاستقرار ومنع تكرار المهام
        ./gradlew assembleRelease --stacktrace --no-daemon -Pandroid.packageNamingPolicy=stable
        cd ..
    
    - name: Sign APK
      id: sign
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      continue-on-error: true
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: l-wesmo-os-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Create Release
      id: create_release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./android/app/build/outputs/apk/release/app-release.apk
        asset_name: l-wesmo-os-release.apk
        asset_content_type: application/vnd.android.package-archive
