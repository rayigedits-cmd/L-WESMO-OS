name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Clean & Install Dependencies
      run: |
        # تنظيف شامل للمجلدات لضمان عدم وجود ملفات تالفة من المحاولات السابقة
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        # تثبيت المكتبة المسؤولة عن الخطأ بشكل صريح ومباشر
        npm install @react-native-async-storage/async-storage --save

    - name: ⚙️ Expo Prebuild
      # نستخدم --no-install لمنع Expo من محاولة إعادة التثبيت وتخريب المسارات
      run: npx expo prebuild --platform android --clean --no-install

    - name: 🔐 Set Execute Permission
      run: chmod +x android/gradlew

    - name: 🧹 Gradle Clean
      run: |
        cd android
        ./gradlew clean
        cd ..

    - name: 🏗️ Build Android APK (Release)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Dorg.gradle.warning.mode=none \
          --stacktrace
        cd ..

    - name: 📤 Upload L'WESMOU OS APK
      uses: actions/upload-artifact@v4
      with:
        name: LWESMOU-OS-Beta-V1
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
        
