name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install Dependencies
      run: |
        npm install --legacy-peer-deps
        # نكتفي بالتثبيت العادي لضمان التوافق مع Autolinking
        npm install @react-native-async-storage/async-storage

    - name: ⚙️ Expo Prebuild
      # إزالة --no-install للسماح لـ Expo بتوليد ملفات الأندرويد الأصلية بشكل صحيح
      run: npx expo prebuild --platform android --clean

    - name: 🔐 Set Execute Permission
      run: chmod +x android/gradlew

    - name: 🛠️ Fix Gradle Repositories
      # هذه الخطوة تعالج فشل تحميل POM الذي ظهر في صورتك الثانية
      run: |
        sed -i "s/google()/google()\n        mavenCentral()\n        maven { url 'https:\/\/jitpack.io' }/g" android/build.gradle

    - name: 🏗️ Build Android APK (Release)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Dorg.gradle.warning.mode=none
        cd ..

    - name: 📤 Upload L'WESMOU OS APK
      uses: actions/upload-artifact@v4
      with:
        name: LWESMOU-OS-Beta-V1
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
