name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install Project Dependencies
      run: npm install --legacy-peer-deps

    - name: 🛠️ Patch Expo Plugins
      # تصحيح الصيغة بإضافة -- كما طلبت سجلات الخطأ في صورتك
      run: npx expo install expo-build-properties -- --non-interactive

    - name: ⚙️ Expo Prebuild
      run: npx expo prebuild --platform android --clean

    - name: 🏗️ Fix Android Repositories (The Core Fix)
      # هذا الأمر يحل مشكلة المكتبات المفقودة في الصور 1000066345 و 1000066346
      run: |
        find android -name "build.gradle" -exec sed -i "s/google()/google()\n        mavenCentral()\n        maven { url 'https:\/\/jitpack.io' }/g" {} +

    - name: 🔐 Set Execute Permission
      run: chmod +x android/gradlew

    - name: 🏗️ Build Android APK (Release)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Dorg.gradle.warning.mode=none
        cd ..

    - name: 📤 Upload L'WESMOU OS APK
      uses: actions/upload-artifact@v4
      with:
        name: LWESMOU-OS-Build
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
        
