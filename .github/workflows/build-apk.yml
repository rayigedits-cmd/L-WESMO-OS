name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install All Dependencies
      # نستخدم CI=1 لتعريف البيئة بأنها أوتوماتيكية وتجنب أي مشاكل تفاعلية
      run: |
        npm install --legacy-peer-deps
        # تثبيت المكتبة يدوياً وبشكل صريح لضمان وجودها قبل الـ Prebuild
        npm install @react-native-async-storage/async-storage --save

    - name: ⚙️ Expo Prebuild
      # نقوم بتنفيذ الـ Prebuild مع تجاهل التحقق من النسخ (Skip dependency check) 
      # لأننا قمنا بتثبيتها يدوياً في الخطوة السابقة
      run: npx expo prebuild --platform android --clean --no-install

    - name: 🔐 Set Execute Permission
      run: chmod +x android/gradlew

    - name: 🏗️ Build Android APK (Release)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Dorg.gradle.warning.mode=none \
          --stacktrace
        cd ..

    - name: 📤 Upload L'WESMOU OS APK
      uses: actions/upload-artifact@v4
      with:
        name: LWESMOU-OS-Beta-V1
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
