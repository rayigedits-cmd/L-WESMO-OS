name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install & Patch Plugins
      run: |
        npm install --legacy-peer-deps
        # الحل الجذري لخطأ السطر 7 في صورتك: تثبيت الملحق قسرياً قبل الـ Prebuild
        npx expo install expo-build-properties --non-interactive

    - name: 🛠️ Expo Prebuild
      run: npx expo prebuild --platform android --clean

    - name: 🔐 Set Execute Permission
      run: chmod +x android/gradlew

    - name: 🏗️ Build Android APK (Gradle 9 Fix)
      run: |
        cd android
        ./gradlew clean
        # استخدام البرامترات التي تمنع الانهيار بسبب تصادم الصور (Facebook/SSL)
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Pandroid.packageNamingPolicy=stable \
          -Dorg.gradle.warning.mode=none
        cd ..

    - name: ✍️ Sign APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: 📤 Upload L'WESMOU OS APK
      uses: actions/upload-artifact@v4
      with:
        name: LWESMOU-OS-Build-Success
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
