name: Build APK (Expo EAS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ جلب الكود
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      # 2️⃣ إعداد Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3️⃣ تثبيت dependencies
      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      # 4️⃣ تثبيت Expo CLI و EAS CLI
      - name: 🔧 Install Expo & EAS
        run: npm install -g expo-cli eas-cli

      # 5️⃣ تسجيل الدخول في Expo باستخدام Secrets
      - name: 🔑 Login to Expo
        run: npx expo login -u ${{ secrets.EXPO_USERNAME }} -p ${{ secrets.EXPO_PASSWORD }}

      # 6️⃣ بناء APK مباشرة (سيستخدم eas.json)
      - name: 🏗️ Build APK
        run: npx eas build -p android --non-interactive --profile preview
