name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Install Project Dependencies
      # نستخدم legacy-peer-deps لأن مشروعك يستخدم React 19 و Expo 55
      # وهذا يضمن تثبيت Tesseract و Moti و PDF-lib دون نزاعات
      run: npm install --legacy-peer-deps

    - name: 🛠️ Patch Missing Plugins
      # هذه الخطوة الآن منفصلة تماماً لضمان عدم تداخلها مع npm install
      # ستقوم فقط بإضافة الملحق الضروري لحل خطأ "PluginError" في السطر 7
      run: npx expo install expo-build-properties --non-interactive

    - name: ⚙️ Expo Prebuild
      # توليد مجلد أندرويد الخام بناءً على الـ app.json الاحترافي الخاص بك
      run: npx expo prebuild --platform android --clean

    - name: 🔐 Set Execute Permission
      run: chmod +x android/gradlew

    - name: 🏗️ Build Android APK (Release)
      # هنا يتم دمج الموارد الضخمة لمشروع L'WESMOU OS
      # أضفنا برامترات تجاوز أخطاء الموارد المكررة لضمان عدم توقف المعالج
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon \
          -Pandroid.mergeResources.failOnErrors=false \
          -Pandroid.packageNamingPolicy=stable \
          -Dorg.gradle.warning.mode=none
        cd ..

    - name: 📤 Upload L'WESMOU OS APK
      # رفع الملف النهائي كـ Artifact للتحميل
      uses: actions/upload-artifact@v4
      with:
        name: LWESMOU-OS-Beta-V1
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 7
